name: Python App Docker Deployment
on: [push]
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
         - name: Check out the repository
           uses: actions/checkout@v2
         
         - name: Set up Python
           uses: actions/setup-python@v2
           with:
             python-version: '3.x'
         
         - name: Print Files
           run: |
             pwd
             ls -la

         - name: Install dependencies
           run: |
             python install -r requirements.txt

         - name: run lint check
           run: |
                pip install flake8
                flake8 .

         - name: run tests
           run: |
                pip install pytest
                pytest
         - name: Login to Docker Hub
           uses: docker/login-action@v1
           with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}

         - name: Build Docker Image
           run: |
                docker build -t ${{ secrets.DOCKER_USERNAME }}/python-app:latest .

         - name: Push Docker Image
           run: |
                docker push ${{ secrets.DOCKER_USERNAME }}/python-app:latest

         - name: Run the Docker container
           run: |
                docker run -d -p 80:80 ${{ secrets.DOCKER_USERNAME }}/python-app:latest
